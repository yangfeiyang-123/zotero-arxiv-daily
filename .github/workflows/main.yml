name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REPOSITORY || github.repository }}
          ref: ${{ vars.REF || github.ref_name }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Restore sent paper history
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: sent-paper-history-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sent-paper-history-${{ github.repository }}-${{ github.ref_name }}-

      - name: Detect entrypoint
        run: |
          pwd
          ls -la
          echo "Checkout repository: ${{ vars.REPOSITORY || github.repository }}"
          echo "Checkout ref: ${{ vars.REF || github.ref_name }}"
          if [ -f "main.py" ]; then
            entrypoint="main.py"
          elif [ -d "src" ]; then
            entrypoint="$(find src -type f -name main.py | head -n 1)"
          fi

          if [ -z "${entrypoint}" ]; then
            echo "::error::No entrypoint found. Expected main.py or src/**/main.py."
            exit 1
          fi
          echo "Using entrypoint: ${entrypoint}"
          echo "ENTRYPOINT=${entrypoint}" >> "${GITHUB_ENV}"

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          ZOTERO_IGNORE: ${{ vars.ZOTERO_IGNORE }}
          SEND_EMPTY: ${{ vars.SEND_EMPTY }}
          ARXIV_QUERY: ${{ secrets.ARXIV_QUERY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          MAX_PAPER_NUM: ${{ secrets.MAX_PAPER_NUM }}
          USE_LLM_API: ${{ secrets.USE_LLM_API }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          LANGUAGE: ${{ vars.LANGUAGE }}
        run: |
          uv run python "${ENTRYPOINT}"

      - name: Save sent paper history
        if: ${{ always() && hashFiles('.state/**') != '' }}
        uses: actions/cache/save@v4
        with:
          path: .state
          key: sent-paper-history-${{ github.repository }}-${{ github.ref_name }}-${{ github.run_id }}
